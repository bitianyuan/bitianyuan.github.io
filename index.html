<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择题扫码答题系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .tips-box {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .tips-error {
            background-color: #fef0f0;
            color: #f56c6c;
            border: 1px solid #fbc4c4;
            display: block;
        }

        .tips-success {
            background-color: #f0f9eb;
            color: #67c23a;
            border: 1px solid #b3e19d;
            display: block;
        }

        #maker-mode {display: block;}
        #exam-mode {display: none;}

        .question-card {
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #fafbfc;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-danger {background-color: #f56c6c;color: #fff;}
        .btn-danger:hover {background-color: #f34747;}
        .btn-primary {background-color: #409eff;color: #fff;width: 100%;padding: 12px;font-size: 16px;margin-bottom: 15px;}
        .btn-primary:hover {background-color: #337ecc;}
        .btn-success {background-color: #67c23a;color: #fff;width: 100%;padding: 12px;font-size: 16px;margin-bottom: 20px;}
        .btn-success:hover {background-color: #529b2e;}
        .btn-secondary {background-color: #909399;color: #fff;margin-top: 10px;}
        .btn-secondary:hover {background-color: #767a82;}
        .btn:disabled {background-color: #c0c4cc;cursor: not-allowed;}

        .form-item {margin-bottom: 15px;}
        .form-label {display: block;margin-bottom: 6px;color: #606266;font-size: 14px;}
        .form-input {width: 100%;padding: 10px 12px;border: 1px solid #dcdfe6;border-radius: 6px;font-size: 14px;outline: none;}
        .form-input:focus {border-color: #409eff;}
        .option-item {display: flex;align-items: center;gap: 10px;margin-bottom: 10px;}
        .option-item .form-input {flex: 1;}

        .radio-group {display: flex;gap: 20px;flex-wrap: wrap;margin-top: 8px;}
        .radio-item {display: flex;align-items: center;gap: 5px;cursor: pointer;}

        .qrcode-box {
            text-align: center;
            padding: 20px;
            border: 2px solid #409eff;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        #qrcode {margin: 0 auto;}

        .exam-question {margin-bottom: 25px;padding-bottom: 20px;border-bottom: 1px solid #e0e6ed;}
        .exam-question-stem {font-weight: 600;color: #2c3e50;margin-bottom: 12px;font-size: 16px;}
        .exam-option {padding: 10px 12px;border: 1px solid #dcdfe6;border-radius: 6px;margin-bottom: 10px;cursor: pointer;transition: all 0.2s;}
        .exam-option:hover {border-color: #409eff;background-color: #ecf5ff;}
        .exam-option.selected {border-color: #409eff;background-color: #ecf5ff;}
        .exam-option.correct {border-color: #67c23a;background-color: #f0f9eb;}
        .exam-option.wrong {border-color: #f56c6c;background-color: #fef0f0;}

        .result-box {text-align: center;padding: 30px;border-radius: 8px;margin-top: 20px;background-color: #f0f9ff;display: none;}
        .result-score {font-size: 48px;font-weight: 700;color: #409eff;margin: 10px 0;}
        .result-desc {color: #606266;font-size: 16px;}
        .answer-tips {margin-top: 8px;font-size: 14px;}
        .tips-correct {color: #67c23a;}
        .tips-wrong {color: #f56c6c;}

        @media (max-width: 600px) {
            .container {padding: 20px 15px;}
            h1 {font-size: 20px;}
            .radio-group {gap: 10px;}
        }
    </style>

<body>
    <div class="container">
        <h1>选择题扫码答题系统</h1>
        <div id="tips-box" class="tips-box"></div>

        <!-- 出题模式 -->
        <div id="maker-mode">
            <div id="question-list"></div>
            <button class="btn btn-primary" onclick="addQuestion()">+ 添加新题目</button>
            <button class="btn btn-success" onclick="generateQRCode()">生成答题二维码</button>
            <div class="qrcode-box" id="qrcode-box">
                <h3>扫码答题</h3>
                <div id="qrcode"></div>
                <p>微信/浏览器扫码均可作答</p>
            </div>
        </div>

        <!-- 答题模式 -->
        <div id="exam-mode">
            <div id="exam-question-list"></div>
            <button class="btn btn-success" id="submit-btn" onclick="submitExam()">提交答案</button>
            <div id="result-box" class="result-box">
                <p>本次得分</p>
                <div class="result-score" id="result-score">0</div>
                <p>共 <span id="total-count">0</span> 题，答对 <span id="correct-count">0</span> 题</p>
            </div>
        </div>
    </div>

    <script>
        // 全局题目数据
        let questionList = [{
            stem: "1+1等于几？",
            options: ["1", "2", "3", "4"],
            correct: 1
        }];
        let examQuestions = [], userAnswers = {};

        // 页面加载自动判断模式
        window.onload = function() {
            const hash = window.location.hash.slice(1);
            if(hash){
                try{
                    // 修复：先atob，再decodeURIComponent
                    examQuestions = JSON.parse(decodeURIComponent(atob(hash)));
                    initExam();
                }catch(e){
                    showTips("链接无效，请重新生成二维码", "error");
                    showMaker();
                }
            }else{
                showMaker();
                renderQuestions();
            }
        }

        // 显示提示
        function showTips(msg, type){
            const box = document.getElementById("tips-box");
            box.innerText = msg;
            box.className = "tips-box tips-" + type;
            setTimeout(function(){ box.className = "tips-box"; }, 3000);
        }

        // 切换模式
        function showMaker(){
            document.getElementById("maker-mode").style.display="block";
            document.getElementById("exam-mode").style.display="none";
        }
        function showExam(){
            document.getElementById("maker-mode").style.display="none";
            document.getElementById("exam-mode").style.display="block";
        }

        // ========== 出题功能 ==========
        function renderQuestions(){
            const dom = document.getElementById("question-list");
            dom.innerHTML = questionList.map(function(q, i){
                return `
                <div class="question-card">
                    <div class="question-header">
                        <span>第${i+1}题</span>
                        <button class="btn btn-danger" onclick="delQ(${i})">删除</button>
                    </div>
                    <div class="form-item">
                        <label class="form-label">题干</label>
                        <input class="form-input" value="${q.stem.replace(/"/g, '&quot;')}" oninput="questionList[${i}].stem=this.value">
                    </div>
                    <div class="form-item">
                        <label class="form-label">选项</label>
                        ${q.options.map(function(opt, j){
                            return `
                            <div class="option-item">
                                <span>${String.fromCharCode(65+j)}.</span>
                                <input class="form-input" value="${opt.replace(/"/g, '&quot;')}" oninput="questionList[${i}].options[${j}]=this.value">
                                <button class="btn btn-danger" onclick="delOpt(${i},${j})">删</button>
                            </div>
                            `;
                        }).join('')}
                        <button class="btn btn-secondary" onclick="addOpt(${i})">+添加选项</button>
                    </div>
                    <div class="form-item">
                        <label class="form-label">正确答案</label>
                        <div class="radio-group">
                            ${q.options.map(function(_, j){
                                return `
                                <label class="radio-item">
                                    <input type="radio" name="c${i}" ${q.correct==j?'checked':''} onchange="questionList[${i}].correct=${j}">
                                    ${String.fromCharCode(65+j)}
                                </label>
                                `;
                            }).join('')}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function addQ(){
            questionList.push({stem:"", options:["","","",""], correct:0});
            renderQuestions();
        }
        function delQ(i){
            if(questionList.length>1) questionList.splice(i,1);
            renderQuestions();
        }
        function addOpt(i){
            if(questionList[i].options.length<8) questionList[i].options.push("");
            renderQuestions();
        }
        function delOpt(i,j){
            if(questionList[i].options.length>2) questionList[i].options.splice(j,1);
            renderQuestions();
        }

        // 生成二维码（核心修复：中文编码处理）
        function generateQRCode(){
            // 校验题目
            for(let i=0; i<questionList.length; i++){
                const q = questionList[i];
                if(!q.stem.trim()){
                    showTips(`第${i+1}题的题干不能为空`, "error");
                    return;
                }
                for(let j=0; j<q.options.length; j++){
                    if(!q.options[j].trim()){
                        showTips(`第${i+1}题的选项${String.fromCharCode(65+j)}不能为空`, "error");
                        return;
                    }
                }
            }
            
            // 修复：先JSON.stringify，再encodeURIComponent，最后btoa
            const jsonStr = JSON.stringify(questionList);
            const safeStr = encodeURIComponent(jsonStr);
            const data = btoa(safeStr);
            const url = window.location.origin + window.location.pathname + '#' + data;
            
            // 显示二维码
            document.getElementById("qrcode-box").style.display="block";
            document.getElementById("qrcode").innerHTML = "";
            
            // 生成二维码
            if(typeof QRCode !== 'undefined'){
                QRCode.toCanvas(document.getElementById("qrcode"), url, {width:250}, function (error) {
                    if (error) {
                        console.error(error);
                        showTips("二维码生成失败，请刷新重试", "error");
                    } else {
                        showTips("二维码生成成功！", "success");
                    }
                });
            } else {
                showTips("二维码库加载失败，请检查网络或使用本地HTTP服务器打开", "error");
            }
        }

        // ========== 答题功能 ==========
        function initExam(){
            showExam();
            const dom = document.getElementById("exam-question-list");
            dom.innerHTML = examQuestions.map(function(q, i){
                return `
                <div class="exam-question">
                    <div class="exam-question-stem">${i+1}. ${q.stem}</div>
                    ${q.options.map(function(opt, j){
                        return `
                        <div class="exam-option" id="q${i}o${j}" onclick="choose(${i},${j})">
                            ${String.fromCharCode(65+j)}. ${opt}
                        </div>
                        `;
                    }).join('')}
                    <div class="answer-tips" id="answer-tips-${i}" style="display: none;"></div>
                </div>
                `;
            }).join('');
        }

        function choose(i,j){
            const options = document.querySelectorAll(`#q${i}o\\d+`);
            options.forEach(function(o){ o.classList.remove("selected"); });
            document.getElementById(`q${i}o${j}`).classList.add("selected");
            userAnswers[i]=j;
        }

        function submitExam(){
            if(Object.keys(userAnswers).length !== examQuestions.length){
                showTips("请完成所有题目后再提交", "error");
                return;
            }
            
            let correctCount = 0;
            examQuestions.forEach(function(q, i){
                const tipsDom = document.getElementById(`answer-tips-${i}`);
                if(userAnswers[i] === q.correct){
                    correctCount++;
                    document.getElementById(`q${i}o${q.correct}`).classList.add("correct");
                    tipsDom.className = "answer-tips tips-correct";
                    tipsDom.innerText = "✅ 回答正确";
                } else {
                    document.getElementById(`q${i}o${userAnswers[i]}`).classList.add("wrong");
                    document.getElementById(`q${i}o${q.correct}`).classList.add("correct");
                    tipsDom.className = "answer-tips tips-wrong";
                    tipsDom.innerText = `❌ 回答错误，正确答案：${String.fromCharCode(65+q.correct)}`;
                }
                tipsDom.style.display = "block";
            });

            // 显示结果
            document.getElementById("result-score").innerText = Math.round(correctCount / examQuestions.length * 100);
            document.getElementById("total-count").innerText = examQuestions.length;
            document.getElementById("correct-count").innerText = correctCount;
            document.getElementById("result-box").style.display = "block";
            document.getElementById("submit-btn").style.display = "none";

            // 禁止再次选择
            const allOptions = document.querySelectorAll(".exam-option");
            allOptions.forEach(function(opt){
                opt.style.pointerEvents = "none";
            });
        }
    </script>
</body>
</html>
