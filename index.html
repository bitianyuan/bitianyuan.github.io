<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择题扫码答题系统</title>
    <!-- 全球稳定HTTPS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", system-ui, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .tips-box {
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .tips-error {
            background-color: #fef0f0;
            color: #f56c6c;
            border: 1px solid #fbc4c4;
            display: block;
        }

        .tips-success {
            background-color: #f0f9eb;
            color: #67c23a;
            border: 1px solid #b3e19d;
            display: block;
        }

        #maker-mode {display: block;}
        #exam-mode {display: none;}

        .question-card {
            border: 1px solid #e0e6ed;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            background-color: #fafbfc;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-danger {background-color: #f56c6c;color: #fff;}
        .btn-danger:hover {background-color: #f34747;}
        .btn-primary {background-color: #409eff;color: #fff;width: 100%;padding: 12px;font-size: 16px;margin-bottom: 15px;}
        .btn-primary:hover {background-color: #337ecc;}
        .btn-success {background-color: #67c23a;color: #fff;width: 100%;padding: 12px;font-size: 16px;margin-bottom: 20px;}
        .btn-success:hover {background-color: #529b2e;}
        .btn-secondary {background-color: #909399;color: #fff;margin-top: 10px;}
        .btn-secondary:hover {background-color: #767a82;}
        .btn:disabled {background-color: #c0c4cc;cursor: not-allowed;}

        .form-item {margin-bottom: 15px;}
        .form-label {display: block;margin-bottom: 6px;color: #606266;font-size: 14px;}
        .form-input {width: 100%;padding: 10px 12px;border: 1px solid #dcdfe6;border-radius: 6px;font-size: 14px;outline: none;}
        .form-input:focus {border-color: #409eff;}
        .option-item {display: flex;align-items: center;gap: 10px;margin-bottom: 10px;}
        .option-item .form-input {flex: 1;}

        .radio-group {display: flex;gap: 20px;flex-wrap: wrap;margin-top: 8px;}
        .radio-item {display: flex;align-items: center;gap: 5px;cursor: pointer;}

        .qrcode-box {
            text-align: center;
            padding: 20px;
            border: 2px solid #409eff;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        #qrcode {margin: 0 auto;}

        .exam-question {margin-bottom: 25px;padding-bottom: 20px;border-bottom: 1px solid #e0e6ed;}
        .exam-question-stem {font-weight: 600;color: #2c3e50;margin-bottom: 12px;font-size: 16px;}
        .exam-option {padding: 10px 12px;border: 1px solid #dcdfe6;border-radius: 6px;margin-bottom: 10px;cursor: pointer;transition: all 0.2s;}
        .exam-option:hover {border-color: #409eff;background-color: #ecf5ff;}
        .exam-option.selected {border-color: #409eff;background-color: #ecf5ff;}
        .exam-option.correct {border-color: #67c23a;background-color: #f0f9eb;}
        .exam-option.wrong {border-color: #f56c6c;background-color: #fef0f0;}

        .result-box {text-align: center;padding: 30px;border-radius: 8px;margin-top: 20px;background-color: #f0f9ff;display: none;}
        .result-score {font-size: 48px;font-weight: 700;color: #409eff;margin: 10px 0;}
        .result-desc {color: #606266;font-size: 16px;}
        .answer-tips {margin-top: 8px;font-size: 14px;}
        .tips-correct {color: #67c23a;}
        .tips-wrong {color: #f56c6c;}

        @media (max-width: 600px) {
            .container {padding: 20px 15px;}
            h1 {font-size: 20px;}
            .radio-group {gap: 10px;}
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>选择题扫码答题系统</h1>
        <div id="tips-box" class="tips-box"></div>

        <!-- 出题模式 -->
        <div id="maker-mode">
            <div id="question-list"></div>
            <button class="btn btn-primary" onclick="addQuestion()">+ 添加新题目</button>
            <button class="btn btn-success" id="generate-btn" onclick="generateQRCode()">生成答题二维码</button>
            <div class="qrcode-box" id="qrcode-box">
                <h3>扫码答题</h3>
                <div id="qrcode"></div>
                <p style="margin-top: 10px; color: #666;">微信/浏览器/QQ扫码均可打开作答</p>
            </div>
        </div>

        <!-- 答题模式 -->
        <div id="exam-mode">
            <div id="exam-question-list"></div>
            <button class="btn btn-success" id="submit-btn" onclick="submitExam()">提交答案</button>
            <div id="result-box" class="result-box">
                <p class="result-desc">本次答题得分</p>
                <div class="result-score" id="result-score">0</div>
                <p class="result-desc">共 <span id="total-count">0</span> 题，答对 <span id="correct-count">0</span> 题</p>
            </div>
        </div>
    </div>

    <script>
        // 全局题目数据
        let questionList = [
            {
                stem: "1+1等于几？",
                options: ["1", "2", "3", "4"],
                correct: 1
            }
        ];
        let examQuestions = [], userAnswers = {};

        // 页面加载初始化
        window.onload = function() {
            if (typeof QRCode === 'undefined') {
                showTips("二维码库加载失败，请刷新页面重试", "error");
                document.getElementById("generate-btn").disabled = true;
            } else {
                showTips("系统加载成功，可开始编辑题目", "success");
            }

            const hash = window.location.hash.slice(1);
            if (hash) {
                try {
                    examQuestions = JSON.parse(decodeURIComponent(atob(hash)));
                    initExamMode();
                } catch (e) {
                    console.error("解析失败：", e);
                    showTips("无效的答题链接，请重新生成二维码", "error");
                    showMakerMode();
                }
            } else {
                showMakerMode();
                renderQuestionList();
            }
        };

        function showTips(message, type) {
            const tipsBox = document.getElementById("tips-box");
            tipsBox.innerText = message;
            tipsBox.className = "tips-box tips-" + type;
            setTimeout(function() {
                tipsBox.className = "tips-box";
            }, 3500);
        }

        function showMakerMode() {
            document.getElementById("maker-mode").style.display = "block";
            document.getElementById("exam-mode").style.display = "none";
        }
        function showExamMode() {
            document.getElementById("maker-mode").style.display = "none";
            document.getElementById("exam-mode").style.display = "block";
        }

        // ========== 出题核心功能 ==========
        function renderQuestionList() {
            const container = document.getElementById("question-list");
            container.innerHTML = "";

            questionList.forEach(function(question, index) {
                const questionCard = document.createElement("div");
                questionCard.className = "question-card";
                questionCard.innerHTML = `
                    <div class="question-header">
                        <span class="question-title">第 ${index + 1} 题</span>
                        <button class="btn btn-danger" onclick="deleteQuestion(${index})">删除题目</button>
                    </div>
                    <div class="form-item">
                        <label class="form-label">题目题干</label>
                        <input 
                            type="text" 
                            class="form-input" 
                            placeholder="请输入题目内容" 
                            value="${question.stem.replace(/"/g, '&quot;')}"
                            oninput="updateQuestionStem(${index}, this.value)"
                        >
                    </div>
                    <div class="form-item">
                        <label class="form-label">题目选项</label>
                        <div class="option-list">
                            ${question.options.map(function(option, optIndex) {
                                return `
                                    <div class="option-item">
                                        <span>${String.fromCharCode(65 + optIndex)}.</span>
                                        <input 
                                            type="text" 
                                            class="form-input" 
                                            placeholder="请输入选项内容" 
                                            value="${option.replace(/"/g, '&quot;')}"
                                            oninput="updateQuestionOption(${index}, ${optIndex}, this.value)"
                                        >
                                        <button class="btn btn-danger" onclick="deleteOption(${index}, ${optIndex})">删除</button>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        <button class="btn btn-secondary" onclick="addOption(${index})">+ 添加选项</button>
                    </div>
                    <div class="form-item">
                        <label class="form-label">正确答案</label>
                        <div class="radio-group">
                            ${question.options.map(function(_, optIndex) {
                                return `
                                    <label class="radio-item">
                                        <input 
                                            type="radio" 
                                            name="correct-${index}" 
                                            value="${optIndex}"
                                            ${question.correct === optIndex ? 'checked' : ''}
                                            onchange="updateCorrectAnswer(${index}, ${optIndex})"
                                        >
                                        ${String.fromCharCode(65 + optIndex)}
                                    </label>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
                container.appendChild(questionCard);
            });
        }

        function addQuestion() {
            questionList.push({
                stem: "",
                options: ["", "", "", ""],
                correct: 0
            });
            renderQuestionList();
        }
        function deleteQuestion(index) {
            if (questionList.length <= 1) {
                showTips("至少保留1道题目", "error");
                return;
            }
            questionList.splice(index, 1);
            renderQuestionList();
        }
        function updateQuestionStem(index, value) {
            questionList[index].stem = value;
        }
        function updateQuestionOption(questionIndex, optIndex, value) {
            questionList[questionIndex].options[optIndex] = value;
        }
        function addOption(questionIndex) {
            const options = questionList[questionIndex].options;
            if (options.length >= 8) {
                showTips("单题最多支持8个选项", "error");
                return;
            }
            options.push("");
            renderQuestionList();
        }
        function deleteOption(questionIndex, optIndex) {
            const options = questionList[questionIndex].options;
            if (options.length <= 2) {
                showTips("单题至少保留2个选项", "error");
                return;
            }
            options.splice(optIndex, 1);
            const correctIndex = questionList[questionIndex].correct;
            if (correctIndex === optIndex) {
                questionList[questionIndex].correct = 0;
            } else if (correctIndex > optIndex) {
                questionList[questionIndex].correct -= 1;
            }
            renderQuestionList();
        }
        function updateCorrectAnswer(questionIndex, optIndex) {
            questionList[questionIndex].correct = optIndex;
        }

        // ========== 核心修复：二维码生成函数 ==========
        function generateQRCode() {
            // 1. 校验题目
            for (let i = 0; i < questionList.length; i++) {
                const question = questionList[i];
                if (!question.stem.trim()) {
                    showTips(`第 ${i + 1} 题的题干不能为空`, "error");
                    return;
                }
                for (let j = 0; j < question.options.length; j++) {
                    if (!question.options[j].trim()) {
                        showTips(`第 ${i + 1} 题的选项 ${String.fromCharCode(65 + j)} 不能为空`, "error");
                        return;
                    }
                }
            }

            // 2. 编码题目数据
            const jsonString = JSON.stringify(questionList);
            const urlSafeString = encodeURIComponent(jsonString);
            const base64Data = btoa(urlSafeString);

            // 3. 生成答题链接（适配GitHub Pages）
            const baseUrl = window.location.origin + window.location.pathname;
            const examUrl = baseUrl + '#' + base64Data;

            // 4. 核心修复：手动创建Canvas元素
            const qrcodeBox = document.getElementById("qrcode-box");
            const qrcodeContainer = document.getElementById("qrcode");
            qrcodeBox.style.display = "block";
            qrcodeContainer.innerHTML = ""; // 清空容器

            // 手动创建一个 <canvas> 元素
            const canvas = document.createElement("canvas");
            canvas.style.display = "block";
            canvas.style.margin = "0 auto";
            qrcodeContainer.appendChild(canvas);

            // 5. 把 canvas 传给 qrcode.js，而不是 div
            QRCode.toCanvas(canvas, examUrl, {
                width: 260,
                margin: 1,
                errorCorrectionLevel: 'M'
            }, function (error) {
                if (error) {
                    console.error("二维码生成失败：", error);
                    showTips("二维码生成失败，请刷新页面重试", "error");
                } else {
                    showTips("二维码生成成功！可扫码作答", "success");
                }
            });
        }

        // ========== 答题核心功能 ==========
        function initExamMode() {
            showExamMode();
            const container = document.getElementById("exam-question-list");
            container.innerHTML = "";

            examQuestions.forEach(function(question, index) {
                const questionItem = document.createElement("div");
                questionItem.className = "exam-question";
                questionItem.id = `exam-question-${index}`;
                questionItem.innerHTML = `
                    <div class="exam-question-stem">${index + 1}. ${question.stem}</div>
                    <div class="exam-option-list">
                        ${question.options.map(function(option, optIndex) {
                            return `
                                <div 
                                    class="exam-option" 
                                    id="option-${index}-${optIndex}"
                                    onclick="selectOption(${index}, ${optIndex})"
                                >
                                    ${String.fromCharCode(65 + optIndex)}. ${option}
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <div class="answer-tips" id="answer-tips-${index}" style="display: none;"></div>
                `;
                container.appendChild(questionItem);
            });
        }

        function selectOption(questionIndex, optIndex) {
            const options = document.querySelectorAll(`#exam-question-${questionIndex} .exam-option`);
            options.forEach(function(opt) {
                opt.classList.remove("selected");
            });
            document.getElementById(`option-${questionIndex}-${optIndex}`).classList.add("selected");
            userAnswers[questionIndex] = optIndex;
        }

        function submitExam() {
            if (Object.keys(userAnswers).length !== examQuestions.length) {
                showTips(`还有 ${examQuestions.length - Object.keys(userAnswers).length} 道题未作答`, "error");
                return;
            }

            let correctCount = 0;
            examQuestions.forEach(function(question, index) {
                const userAnswer = userAnswers[index];
                const correctAnswer = question.correct;
                const tipsDom = document.getElementById(`answer-tips-${index}`);

                if (userAnswer === correctAnswer) {
                    correctCount++;
                    document.getElementById(`option-${index}-${correctAnswer}`).classList.add("correct");
                    tipsDom.className = "answer-tips tips-correct";
                    tipsDom.innerText = "✅ 回答正确";
                } else {
                    document.getElementById(`option-${index}-${userAnswer}`).classList.add("wrong");
                    document.getElementById(`option-${index}-${correctAnswer}`).classList.add("correct");
                    tipsDom.className = "answer-tips tips-wrong";
                    tipsDom.innerText = `❌ 回答错误，正确答案：${String.fromCharCode(65 + correctAnswer)}`;
                }
                tipsDom.style.display = "block";
            });

            const totalCount = examQuestions.length;
            const score = Math.round((correctCount / totalCount) * 100);
            document.getElementById("result-score").innerText = score;
            document.getElementById("total-count").innerText = totalCount;
            document.getElementById("correct-count").innerText = correctCount;
            document.getElementById("result-box").style.display = "block";
            document.getElementById("submit-btn").style.display = "none";

            const allOptions = document.querySelectorAll(".exam-option");
            allOptions.forEach(function(opt) {
                opt.style.pointerEvents = "none";
            });
        }
    </script>
</body>
</html>
